<div class="browser-container">

  <div class="browser-search-bar">
    <img src="./icons/VELA.png" class="vela-logo" >
    <input id="browser-url-input" type="text" placeholder="Search" onmousedown="event.stopPropagation()">
    <button id="browser-go-btn">Search</button>
  </div>

  <div class="browser-bookmarks">
    <div class="bookmark" data-url="https://google.com"><img class="bookmark-logo"src="./icons/google.png"><span> Google</span></div>
    <div class="bookmark" data-url="https://youtube.com"><img class="bookmark-logo"src="./icons/youtube.png"><span>Youtube</span></div>
    <div class="bookmark" data-url="https://github.com"><img class="bookmark-logo"src="./icons/github.png"><span>Github</span></div>
    <div class="bookmark" data-url="https://stardance.hackclub.com/home"><img class="bookmark-logo"src="./icons/stardance.png"><span>Star Dance</span></div>
  </div>

</div>

<link rel="stylesheet" href="./style.css">
