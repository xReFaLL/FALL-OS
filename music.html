<div class="music-container">

  <div class="bar">
    <div id="info" class="regularbutton smallbutton">
    </div>
  </div>

  <div id="song-panel" class="song-panel" style="display:none">
    <ul id="songlist"></ul>
  </div>

  <div class="now-playing">
    <img id="now-playing-cover" class="now-playing-cover">
    <p id="now-playing-title" class="now-playing-title"></p>
    <p id="now-playing-author" class="now-playing-author"></p>
  </div>
  <div class="progress-container">
    <span id="current-time">0:00</span>
    <input id="progress-bar" type="range" value="0" min="0" step="0.1">
    <span id="total-time">0:00</span>
  </div>
  <div class="music-player-bar">
    <div id="return_button" class="regularbutton">
      <img src="./icons/angle_left.png" class="buttonContent">
    </div>
    <div id="stop_button" class="mainbutton">
      <img id="play-icon" src="./icons/play.png" class="mainbuttonContent">
    </div>
    <div id="skip_button" class="regularbutton">
      <img src="./icons/angle_right.png" class="buttonContent">
    </div>
  </div>

  <audio id="audio-player"></audio>
</div>
